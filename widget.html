<!DOCTYPE html>

<head>

<title>Free Daily Tarot Card Widget | Deckaura</title>
<meta name="description" content="Free embeddable daily tarot card widget for your website. Works on WordPress, Shopify, Wix, Squarespace, and any HTML site.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Georgia,serif;background:transparent;display:flex;justify-content:center}
.dw{background:linear-gradient(145deg,#0f0c28,#1a1545);border-radius:16px;padding:24px;max-width:320px;width:100%;color:#e8e0d0;text-align:center;border:1px solid #c9a84c33}
.dw h3{color:#c9a84c;font-size:1.1em;margin:0 0 12px;letter-spacing:1px}
.dw-card{background:linear-gradient(145deg,#1a1545,#252060);border:2px solid #c9a84c;border-radius:12px;padding:20px 16px;margin:12px 0;cursor:pointer;transition:transform 0.3s}
.dw-card:hover{transform:scale(1.02);box-shadow:0 0 20px #c9a84c33}
.dw-card.revealed .dw-prompt{display:none}
.dw-prompt{color:#c9a84c;font-size:2.5em;margin:10px 0}
.dw-prompt-text{color:#8880aa;font-size:0.8em;letter-spacing:2px}
.dw-name{color:#c9a84c;font-size:1.2em;font-weight:bold;margin:8px 0 4px}
.dw-arcana{color:#8880aa;font-size:0.75em;margin-bottom:10px}
.dw-section{text-align:left;margin:8px 0}
.dw-label{color:#c9a84c;font-size:0.7em;font-weight:bold;letter-spacing:1px;text-transform:uppercase}
.dw-text{color:#ccc8e0;font-size:0.82em;line-height:1.5;margin:3px 0 8px}
.dw-yn{display:inline-block;background:#c9a84c22;border:1px solid #c9a84c44;border-radius:20px;padding:4px 14px;font-size:0.75em;color:#c9a84c;margin:6px 0}
.dw-btn{display:inline-block;background:linear-gradient(to right,#c9a84c,#a8872e);color:#0f0c28;border:none;padding:10px 24px;border-radius:30px;font-family:Georgia;font-size:0.85em;font-weight:bold;cursor:pointer;margin:10px 0 6px;transition:transform 0.2s}
.dw-btn:hover{transform:scale(1.05)}
.dw-link{color:#8880aa;font-size:0.7em;text-decoration:none;display:block;margin-top:6px}
.dw-link:hover{color:#c9a84c}
.dw-footer{margin-top:10px;padding-top:10px;border-top:1px solid #c9a84c22}
.dw-footer a{color:#c9a84c;text-decoration:none;font-size:0.72em}
.dw-result{display:none}
.dw-card.revealed .dw-result{display:block}
</style>
</head>
<body>
<div class="dw" id="dw">
<h3>Daily Tarot Card</h3>
<div class="dw-card" id="dwCard" onclick="dwDraw()">
<div class="dw-prompt">&#10022;</div>
<div class="dw-prompt-text">TAP TO REVEAL</div>
<div class="dw-result" id="dwResult"></div>
</div>
<button class="dw-btn" onclick="dwDraw()">Draw Another Card</button>
<div class="dw-footer">
<a href="https://deckaura.com/pages/free-tarot-reading" target="_blank" rel="noopener">Full Reading</a> &middot;

<br>
<a href="https://deckaura.com" target="_blank" rel="noopener" style="color:#c9a84c;font-size:0.8em;margin-top:6px;display:inline-block">Powered by Deckaura</a>
</div>
</div>
<script>
var C=[
{n:"The Fool",a:"Major Arcana",u:"New beginnings, innocence, adventure",r:"Recklessness, fear of change",l:"Exciting new romance",yn:"Yes",s:"fool"},
